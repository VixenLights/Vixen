name: Unit Tests

on:
  pull_request:
    branches:
      - master
      - 'feature/**'
    paths-ignore:
      - '**/.gitignore'
      - '**/README.md'
      - .github/**
      - .tgitconfig
      - 'Release Notes.txt'
      - 'qodana.yml'
      - 'CLAUDE.md'
      - 'AGENTS.md'
      - '.claude/**'
      - '.agents/**'
      - 'docs/**'

jobs:

  unit_tests:

    runs-on: windows-2025-vs2026

    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Display dotnet version
        run: dotnet --version

      - name: Run unit tests
        run: dotnet test src\Vixen.Tests\Vixen.Tests.csproj -c Release -p:SolutionDir="${{ github.workspace }}\"
