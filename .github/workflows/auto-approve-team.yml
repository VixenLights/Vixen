name: Auto approve PRs for merge approved by Vixen Developer Team members

on:
  workflow_dispatch:
  pull_request_review:
    types: [submitted]

jobs:
  # Auto approve PR with Vixen Developer Team member approval
  auto-approve:
    if: github.event.review.state == 'approved'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
     
    steps:
      - name: Check user for Vixen Developer Team affiliation
        id: teamAffiliation
        uses: tspascoal/get-user-teams-membership@v3
        with:
          username: ${{ github.actor }}
          team: vixen-developers
          GITHUB_TOKEN: ${{ secrets.READ_ORG_MEMBERS }}

      - name: Check user for Vixen Maintainer Team affiliation
        id: maintainerAffiliation
        uses: tspascoal/get-user-teams-membership@v3
        with:
          username: ${{ github.actor }}
          team: vixen-maintainer
          GITHUB_TOKEN: ${{ secrets.READ_ORG_MEMBERS }}

      - name: Auto approve if team member
        if: ${{ steps.teamAffiliation.outputs.isTeamMember == 'true' && steps.maintainerAffiliation.outputs.isTeamMember == 'false' }}
        uses: hmarr/auto-approve-action@v4
        with:
          review-message: "Auto approved with Vixen Developer Team member approval"
